MEMORY
{
    ZP:     file = "", define = yes, start = $0002, size = $001A;
    RAM:    file = "", define = yes, start = $0200, size = $01E0;
    ROM:    file = %O, start = $A000, size = $1000, fill = yes;
}

SEGMENTS
{
    HEADER: load = ROM, type = ro, start = $A000;
    CODE:   load = ROM, type = ro, start = $A009;
    RODATA: load = ROM, type = ro;
    DATA:   load = ROM, type = rw, define = yes;
    BSS:    load = RAM, type = bss, define = yes;
}
